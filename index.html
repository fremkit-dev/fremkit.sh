<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>fremkit.sh — Coming soon</title>
    <meta
      name="description"
      content="The Fremkit installer endpoint. Not yet generally available."
    >
    <style>
      :root {
        --desert-sand: #e8c872;
        --spice-orange: #d4763b;
        --night-sky: #0f1923;
        --paper: #f7f0dc;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(232, 200, 114, 0.28), transparent 32%),
          radial-gradient(circle at bottom right, rgba(212, 118, 59, 0.22), transparent 24%),
          linear-gradient(160deg, var(--night-sky), #172635 62%, #243544);
        color: var(--paper);
        display: grid;
        place-items: center;
      }

      main {
        max-width: 540px;
        padding: 48px 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1;
        letter-spacing: -0.04em;
        color: #fff7e0;
      }

      p {
        margin: 0 0 20px;
        font-size: 1.05rem;
        line-height: 1.6;
        color: rgba(247, 240, 220, 0.88);
      }

      a {
        color: var(--desert-sand);
        text-decoration: none;
        border-bottom: 1px solid rgba(232, 200, 114, 0.4);
      }

      a:hover {
        border-bottom-color: var(--spice-orange);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>fremkit.sh</h1>
      <p>The Fremkit installer is not yet generally available.</p>
      <p>Visit <a href="https://fremkit.dev">fremkit.dev</a> for updates.</p>
    </main>
  </body>
</html>
